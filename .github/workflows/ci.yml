name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install PipeWire dev headers
        run: sudo apt-get update && sudo apt-get install -y libpipewire-0.3-dev

      - name: Install cross-compilation tools (aarch64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
          # Install aarch64 PipeWire headers
          sudo dpkg --add-architecture arm64
          sudo apt-get update || true
          sudo apt-get install -y libpipewire-0.3-dev:arm64 || true

      - run: npm install

      - name: Build native module
        run: |
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-gnu" ]; then
            npx napi build --platform --release --target ${{ matrix.target }}
          else
            npx napi build --platform --release
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bindings-${{ matrix.target }}
          path: "*.node"
          if-no-files-found: error

  # Simple smoke test on native x64
  test:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/download-artifact@v4
        with:
          name: bindings-x86_64-unknown-linux-gnu
          path: .

      - name: Install PipeWire
        run: sudo apt-get update && sudo apt-get install -y pipewire

      - name: Smoke test (import + type check)
        run: node -e "const p = require('.'); console.log('exports:', Object.keys(p))"
